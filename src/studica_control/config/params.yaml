# This parameter list is used to configure sensors for the Studica Robotics ROS2 control server.
# 
# To enable a sensor type, set "enabled: true" under its section.
# If the sensor type (e.g., cobra, duty_cycle) has a "sensors" list, you can use multiple sensors by uniquely naming them.
# Then, for each named sensor, add a section underneath with its specific parameters (e.g., port, topic).
#
# Example (ultrasonic):
#   sensors: ["ultrasonic1", "ultrasonic2"]
#   ultrasonic1:
#     ping: 8
#     echo: 9
#     topic: "range_1"
#   ultrasonic2:
#     ping: 10
#     echo: 11
#     topic: "range_2"
#

control_server:
  ros__parameters:
    cobra:
      enabled: false
      sensors: ["cobra"]
      cobra:
        vref: 5.0
        topic: "cobra"

    duty_cycle:
      enabled: false
      sensors: ["duty_cycle"]
      duty_cycle:
        port: 12
        topic: "duty_cycle_encoder"

    omni_drive_component:
      enabled: false
      name: "omni_drive_controller"
      can_id: 42
      motor_freq: 15600
      ticks_per_rotation: 1464
      wheel_radius: 0.05 # in metres
      wheelbase: 0.28 # in metres
      width: 0.3 # in metres
      left: 0
      right: 1
      back: 3
      invert_left: false
      invert_right: false
      invert_back: false

    omni_drive_odometry:
      name: "omni_odom"
      use_imu: true
      imu_topic: "imu"
      topic: "odom"
      publish_tf: false

    diff_drive_component:
      enabled: false
      name: "diff_drive_controller"
      can_id: 42
      motor_freq: 15600
      ticks_per_rotation: 1464
      wheel_radius: 0.05 # in metres
      wheelbase: 0.28 # in metres
      width: 0.3 # in metres
      front_left: 0
      front_right: 1
      rear_left: 0
      rear_right: 1
      invert_front_left: false
      invert_front_right: true
      invert_rear_left: false
      invert_rear_right: true
    
    diff_drive_odometry:
      name: "differential_odom"
      use_imu: true
      imu_topic: "imu"
      topic: "odom"
      publish_tf: false

    dio:
      enabled: false
      sensors: ["limit_high", "limit_low", "stop", "start"]
      limit_high:
        pin: 8
        type: "input" # "input" or "output"
        topic: "robot/sensor/limit_switch/high/raw"
      limit_low:
        pin: 9
        type: "input" # "input" or "output"
        topic: "robot/sensor/limit_switch/low/raw"
      stop:
        pin: 10
        type: "input" # "input" or "output"
        topic: "robot/button/stop/raw"
      start:
        pin: 11
        type: "input" # "input" or "output"
        topic: "robot/button/start/raw"
    
    encoder:
      enabled: false
      sensors: ["rear_right", "front_right", "front_left", "rear_left"]
      rear_right:
        port_a: 0
        port_b: 1
        topic: "rr_enc"
      front_right:
        port_a: 2
        port_b: 3
        topic: "fr_enc"
      front_left:
        port_a: 4
        port_b: 5
        topic: "fl_enc"
      rear_left:
        port_a: 6
        port_b: 7
        topic: "rl_enc"

    gamepad:
      enabled: false
      name: "gamepad_controller"
      cmd_vel_topic: "/cmd_vel"
      linear_scale: 0.7
      angular_scale: 1.0
      deadzone: 0.1
      turbo_multiplier: 1.5
      button_turbo: 5       # R1 button

    imu:
      enabled: true
      name: "imu"
      topic: "imu"

    mecanum_drive_component:
      enabled: false
      name: "mecanum_drive_controller"
      can_id: 42
      motor_freq: 15600
      ticks_per_rotation: 1464
      wheel_radius: 0.05 # in metres
      wheelbase: 0.28 # in metres
      width: 0.3 # in metres
      front_left: 2
      front_right: 0
      rear_left: 3
      rear_right: 1
      invert_front_left: false
      invert_front_right: true
      invert_rear_left: false
      invert_rear_right: true

    mecanum_drive_odometry:
      name: "mecanum_odom"
      use_imu: false
      imu_topic: "imu"
      topic: "odom"

    servo:
      enabled: false
      sensors: ["servo_gripper", "servo_base", "servo_arm", "servo_elbow", "servo_wrist", "servo_elevator"]
      servo_gripper:
        port: 16
        type: "standard" # "standard", "continuous", or "linear"
        topic: "/servo/gripper"
      servo_base:
        port: 17
        type: "standard" 
        topic: "/servo/base"
      servo_arm:
        port: 18
        type: "standard" 
        topic: "/servo/arm"
      servo_elbow:
        port: 19
        type: "standard" 
        topic: "/servo/elbow"
      servo_wrist:
        port: 20
        type: "standard" 
        topic: "/servo/wrist"
      servo_elevator:
        port: 21
        type: "continuous" 
        topic: "/servo/elevator"

    sharp:
      enabled: false
      sensors: ["sharp_right", "sharp_left", "sharp_arm"]
      sharp_right:
        port: 22
        topic: "robot/sensor/sharp/right/raw"
      sharp_left:
        port: 23
        topic: "robot/sensor/sharp/left/raw"
      sharp_arm:
        port: 24
        topic: "robot/sensor/sharp/arm/raw"

    # titan:
    #   enabled: true
    #   sensors: ["titan"]
    #   titan:
    #     can_id: 42
    #     motor_freq: 15600
    #     topic: "titan_encoders"

    titan:
      enabled: true
      sensors: ["titan0"]
      titan0:
        can_id: 42              # CAN bus ID of the Titan controller
        motor_freq: 15600       # PWM frequency in Hz
        encoder_rate_hz: 20      # encoder/rpm publish rate (default 20 Hz)
        motor_update_rate_hz: 50 # how often motor speeds are sent to hardware, in Hz (default 50)
        limit_switches: false    # true = publish /m_N/limit_fwd and /m_N/limit_rev (std_msgs/Bool)
        enable_freshness: false  # true = skip publish on stale CAN frames (encoder, RPM, cypher max, limit switches); warn after 5 consecutive stale reads
        m_0:
          encoder_mode: "quadrature"   # "quadrature" or "absolute"
          dist_per_tick: 0.0006830601  # metres per encoder tick (1.0 = raw counts)
        m_1:
          encoder_mode: "quadrature"
          dist_per_tick: 0.0006830601
        m_2:
          encoder_mode: "quadrature"     # Cypher encoder -> publishes /titan0/m_2/angle
          dist_per_tick: 0.0006830601
        m_3:
          encoder_mode: "quadrature"
          dist_per_tick: 0.0006830601

    ultrasonic:
      enabled: false
      sensors: ["ultrasonic_right", "ultrasonic_left"]
      ultrasonic_right:
        ping: 0
        echo: 1
        topic: "robot/sensor/ultrasonic/right/raw"
      ultrasonic_left:
        ping: 2
        echo: 3
        topic: "robot/sensor/ultrasonic/left/raw"
